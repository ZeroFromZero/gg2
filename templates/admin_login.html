<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — Zuppon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; }
    .login-logo { display: flex; align-items: center; gap: 0.5rem; font-weight: 800; font-size: 1.1rem; color: white; margin-bottom: 2rem; justify-content: center; }
    .login-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    h2 { font-size: 1.3rem; font-weight: 800; color: white; margin-bottom: 0.4rem; text-align: center; }
    .subtitle { font-size: 0.82rem; color: rgba(255,255,255,0.35); text-align: center; margin-bottom: 1.8rem; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.5); margin-bottom: 0.4rem; }
    input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 0.75rem 1rem; color: white; font-size: 0.9rem; font-family: 'Inter', sans-serif; outline: none; margin-bottom: 1rem; }
    input:focus { border-color: #6366f1; }
    .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #f87171; font-size: 0.8rem; padding: 0.6rem 0.9rem; border-radius: 9px; margin-bottom: 1rem; }
    button { width: 100%; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; border-radius: 11px; padding: 0.85rem; font-size: 0.9rem; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .back { display: block; text-align: center; margin-top: 1.2rem; font-size: 0.78rem; color: rgba(255,255,255,0.3); }
    .back:hover { color: white; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <img src="/static/logo.jpeg" alt="Zuppon" style="height:48px;object-fit:contain;">
      <span>Zuppon</span>
    </div>
    <h2>Ingresar</h2>
    <p class="subtitle">Acceso al panel de administración</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Usuario</label>
      <input type="text" name="username" required autofocus>
      <label>Contraseña</label>
      <input type="password" name="password" required>
      <button type="submit">Ingresar →</button>
    </form>
    <a href="/" class="back">← Volver al inicio</a>
  </div>
</body>
</html>
